<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - TutorMatch</title>
  <link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=Noto+Serif+Display:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../StyleSheet.css" />
  
</head>

<body>

  <nav class="barra-nav">

    <div class="contenedor">

      <a href="../index.html" class="logo-nav">tutor<span class="punto-logo">.</span>match</a>

    </div>

  </nav>

  <main class="contenedor" style="padding: 2rem 0;">
    <div class="tarjeta" style="max-width: 500px; margin: 0 auto;">
        <div class="tarjeta tarjeta-formulario">
        <div class="encabezado-formulario"></div>
        <h1>Iniciar sesión</h1>
      
      

      <form id="loginForm" novalidate>
        <div class="campo-formulario">
          <label for="email">Correo</label>
          <input id="email" name="email" type="email" placeholder="correo@ejemplo.com"/>
          <small id="email-error" class="error-text"></small>
        </div>

        <div class="campo-formulario">
          <label for="password">Contraseña</label>
          <input id="password" name="password" type="password" placeholder="contraseña" />
          <small id="password-error" class="error-text"></small>
        </div>

        <p id="login-general-error" class="error-text"></p>

        <button type="submit" class="boton boton-morado boton-grande">
          Entrar
        </button>
      </form>
    </div>
  </main>

  <script type="module">
    import { login } from "../js/auth.js";
    import { validateLogin } from "../js/validators.js";
    import { showFieldError, clearErrors } from "../js/ui.js";

    const form = document.getElementById("loginForm");
    const generalError = document.getElementById("login-general-error");

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      clearErrors(["email", "password"]);
      generalError.textContent = "";

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const errors = validateLogin({ email, password });

      if (errors.email) showFieldError("email", errors.email);
      if (errors.password) showFieldError("password", errors.password);

      if (Object.keys(errors).length > 0) return;

      const result = login(email, password);

      if (!result.success) {
        generalError.textContent = result.message;
        return;
      }

      window.location.href = "../index.html";
    });
  </script>

</body>

</html>
