<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - TutorMatch</title>
  <link rel="stylesheet" href="../StyleSheet.css" />
</head>
<body>
  <main class="contenedor" style="padding: 3rem 0;">
    <div class="tarjeta" style="max-width: 500px; margin: 0 auto;">
      <h1>Iniciar sesión</h1>

      <form id="loginForm" novalidate>
        <div class="campo-formulario">
          <label for="email">Correo</label>
          <input id="email" name="email" type="email" />
          <small id="email-error" class="error-text"></small>
        </div>

        <div class="campo-formulario">
          <label for="password">Contraseña</label>
          <input id="password" name="password" type="password" />
          <small id="password-error" class="error-text"></small>
        </div>

        <p id="login-general-error" class="error-text"></p>

        <button type="submit" class="boton boton-morado boton-grande">
          Entrar
        </button>
      </form>
    </div>
  </main>

  <script type="module">
    import { login } from "../js/auth.js";
    import { validateLogin } from "../js/validators.js";
    import { showFieldError, clearErrors } from "../js/ui.js";

    const form = document.getElementById("loginForm");
    const generalError = document.getElementById("login-general-error");

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      clearErrors(["email", "password"]);
      generalError.textContent = "";

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const errors = validateLogin({ email, password });

      if (errors.email) showFieldError("email", errors.email);
      if (errors.password) showFieldError("password", errors.password);

      if (Object.keys(errors).length > 0) return;

      const result = login(email, password);

      if (!result.success) {
        generalError.textContent = result.message;
        return;
      }

      window.location.href = "../index.html";
    });
  </script>
</body>
</html>
