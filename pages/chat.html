<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Chats - TutorMatch</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=Noto+Serif+Display:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
    rel="stylesheet"
  />

  <link
    rel="stylesheet"
    href="../StyleSheet.css"
  />

  <style>

    .chat-app {

      display: grid;

      grid-template-columns: 320px 1fr;

      height: calc(100vh - 90px);

    }

    .chat-sidebar {

      border-right: 1px solid var(--color-borde);

      background: white;

      overflow-y: auto;

    }

    .chat-sidebar-header {

      padding: 1.5rem;

      border-bottom: 1px solid var(--color-borde);

      font-weight: 800;

    }

    .chat-item {

      padding: 1rem;

      border-bottom: 1px solid #eee;

      cursor: pointer;

      transition: 0.2s;

    }

    .chat-item:hover {

      background: #fafafa;

    }

    .chat-item-nombre {

      font-weight: 700;

      margin-bottom: 0.3rem;

    }

    .chat-item-preview {

      font-size: 0.9rem;

      opacity: 0.7;

    }

    .chat-main {

      display: flex;

      flex-direction: column;

      background: #fcfcfc;

    }

    .chat-header {

      padding: 1rem 1.5rem;

      border-bottom: 1px solid var(--color-borde);

      background: white;

      display: flex;

      justify-content: space-between;

      align-items: center;

    }

    .chat-header-info {

      display: flex;

      align-items: center;

      gap: 1rem;

    }

    .chat-avatar {

      width: 48px;

      height: 48px;

      border-radius: 50%;

      background: var(--color-morado);

      color: white;

      display: flex;

      align-items: center;

      justify-content: center;

      font-weight: 800;

    }

    .chat-messages {

      flex: 1;

      overflow-y: auto;

      padding: 1.5rem;

      display: flex;

      flex-direction: column;

      gap: 1rem;

    }

    .mensaje {

      max-width: 70%;

      padding: 1rem;

      border-radius: 18px;

      line-height: 1.4;

    }

    .mensaje-propio {

      align-self: flex-end;

      background: var(--color-morado);

      color: white;

    }

    .mensaje-ajeno {

      align-self: flex-start;

      background: white;

      border: 1px solid #eee;

    }

    .chat-input {

      padding: 1rem;

      background: white;

      border-top: 1px solid var(--color-borde);

      display: flex;

      gap: 1rem;

    }

    .chat-input textarea {

      flex: 1;

      resize: none;

      height: 60px;

      border-radius: 14px;

      padding: 1rem;

      border: 1px solid #ddd;

      font-family: inherit;

    }

    @media (max-width: 768px) {

      .chat-app {

        grid-template-columns: 1fr;

      }

      .chat-sidebar {

        display: none;

      }

    }

  </style>

</head>

<body>

  <!-- NAV -->

  <nav class="barra-nav">

    <div class="contenedor">

      <a
        href="../index.html"
        class="logo-nav"
      >
        tutor<span class="punto-logo">.</span>match
      </a>

      <div class="botones-nav">

        <a
          href="my-bookings.html"
          class="boton boton-borde boton-chico"
        >
          ← Mis reservas
        </a>

      </div>

    </div>

  </nav>

  <!-- CHAT APP -->

  <main class="chat-app">

    <!-- SIDEBAR -->

    <aside class="chat-sidebar">

      <div
        class="chat-sidebar-header"
        id="sidebarTitle"
      >
        Chats
      </div>

      <!-- ESTUDIANTE -->

      <div
        id="sidebarEstudiante"
      >

        <div class="chat-item">

          <div class="chat-item-nombre">
            Ana Henao
          </div>

          <div class="chat-item-preview">
            Tutoría de cálculo
          </div>

        </div>

      </div>

      <!-- TUTOR -->

      <div
        id="sidebarTutor"
        style="display:none;"
      >

        <div class="chat-item">

          <div class="chat-item-nombre">
            Carlos Pérez
          </div>

          <div class="chat-item-preview">
            Solicitud pendiente
          </div>

        </div>

      </div>

    </aside>

    <!-- MAIN -->

    <section class="chat-main">

      <!-- HEADER -->

      <header class="chat-header">

        <div class="chat-header-info">

          <div class="chat-avatar">
            AH
          </div>

          <div>

            <div
              id="chatUserName"
              style="font-weight:800;"
            >
              Ana Henao
            </div>

            <div
              id="chatRoleLabel"
              style="font-size:0.9rem;opacity:0.7;"
            >
              Tutora de cálculo
            </div>

          </div>

        </div>

        <div>

          <span class="etiqueta etiqueta-verde">
            Sesión activa
          </span>

        </div>

      </header>

      <!-- MENSAJES -->

      <div
        id="messagesContainer"
        class="chat-messages"
      >

        <div
          class="mensaje mensaje-ajeno"
        >
          Hola 👋
        </div>

        <div
          class="mensaje mensaje-propio"
        >
          Hola, tengo dudas sobre integrales.
        </div>

      </div>

      <!-- INPUT -->

      <div class="chat-input">

        <textarea
          id="messageInput"
          placeholder="Escribe un mensaje..."
        ></textarea>

        <button
          id="sendBtn"
          class="boton boton-morado"
        >
          Enviar
        </button>

      </div>

    </section>

  </main>

  <!-- SCRIPT -->

  <script type="module">

    import {
      getSession
    } from "../js/auth.js";

    const session =
      getSession();

    const sidebarTitle =
      document.getElementById(
        "sidebarTitle"
      );

    const sidebarTutor =
      document.getElementById(
        "sidebarTutor"
      );

    const sidebarEstudiante =
      document.getElementById(
        "sidebarEstudiante"
      );

    const chatRoleLabel =
      document.getElementById(
        "chatRoleLabel"
      );

    // =========================
    // TUTOR
    // =========================

    if (
      session?.role === "tutor"
    ) {

      sidebarTitle.textContent =
        "Estudiantes";

      sidebarTutor.style.display =
        "block";

      sidebarEstudiante.style.display =
        "none";

      chatRoleLabel.textContent =
        "Estudiante";

    }

    // =========================
    // ESTUDIANTE
    // =========================

    else {

      sidebarTitle.textContent =
        "Tutores";

      sidebarTutor.style.display =
        "none";

      sidebarEstudiante.style.display =
        "block";

      chatRoleLabel.textContent =
        "Tutora de cálculo";

    }

  </script>

</body>
</html>
