<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Chats - TutorMatch</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=Noto+Serif+Display:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
    rel="stylesheet"
  />

  <link
    rel="stylesheet"
    href="../StyleSheet.css"
  />

  <link
    rel="stylesheet"
    href="../css/chat.css"
  />

</head>

<body>

  <!-- NAVBAR -->

  <nav class="barra-nav">

    <div class="contenedor">

      <a
        href="../index.html"
        class="logo-nav"
      >
        tutor<span class="punto-logo">.</span>match
      </a>

      <div class="botones-nav">

        <a
          href="my-bookings.html"
          class="boton boton-borde boton-chico"
        >
          ← Mis reservas
        </a>

      </div>

    </div>

  </nav>

  <!-- CHAT -->

  <main class="chat-app">

    <!-- SIDEBAR -->

    <aside class="chat-sidebar">

      <div
        id="sidebarTitle"
        class="chat-sidebar-header"
      >
        Chats
      </div>

      <div id="chatList">

        <div
          class="chat-item"
          data-chat="1"
          data-name="Ana Henao"
        >

          <div class="chat-item-nombre">
            Ana Henao
          </div>

          <div class="chat-item-preview">
            Último mensaje...
          </div>

        </div>

        <div
          class="chat-item"
          data-chat="2"
          data-name="Carlos Pérez"
        >

          <div class="chat-item-nombre">
            Carlos Pérez
          </div>

          <div class="chat-item-preview">
            Hola 👋
          </div>

        </div>

        <div
          class="chat-item"
          data-chat="3"
          data-name="Laura Gómez"
        >

          <div class="chat-item-nombre">
            Laura Gómez
          </div>

          <div class="chat-item-preview">
            Gracias por la tutoría
          </div>

        </div>

      </div>

    </aside>

    <!-- MAIN -->

    <section class="chat-main">

      <header class="chat-header">

        <div id="chatSelectedTitle">

          Selecciona un chat

        </div>

      </header>

      <!-- EMPTY -->

      <div
        id="emptyChat"
        class="chat-empty"
      >

        <h2>
          Selecciona una conversación
        </h2>

        <p>
          Elige un chat desde la barra lateral.
        </p>

      </div>

      <!-- MENSAJES -->

      <div
        id="messagesContainer"
        class="chat-messages"
        style="display:none;"
      >
      </div>

      <!-- INPUT -->

      <div
        id="chatInputContainer"
        class="chat-input"
        style="display:none;"
      >

        <textarea
          id="messageInput"
          placeholder="Escribe un mensaje..."
        ></textarea>

        <button
          id="sendBtn"
          class="boton boton-morado"
        >
          Enviar
        </button>

      </div>

    </section>

  </main>

  <!-- JS -->

  <script
    type="module"
    src="../js/chat.js"
  ></script>

</body>
</html>
