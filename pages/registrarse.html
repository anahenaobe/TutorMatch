<!DOCTYPE html>
<html lang="es">

<head>
    
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Registrarse - TutorMatch</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=Noto+Serif+Display:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../StyleSheet.css" />

</head>

<body>
>
  <nav class="barra-nav">

    <div class="contenedor">

      <a href="../index.html" class="logo-nav">tutor<span class="punto-logo">.</span>match</a>

      <div class="botones-nav">
        <a href="login.html" class="boton boton-transparente">
          ¿Ya tienes cuenta? Inicia sesión
        </a>
      </div>

    </div>

  </nav>

  <main class="pagina-registro">

    <div class="contenedor">
      <div class="tarjeta tarjeta-formulario">
        <div class="encabezado-formulario">
          <h1 class="titulo-formulario">Crear cuenta</h1>
        </div>

        <!-- Selector de rol -->
        <div class="selector-rol">

          <div class="opcion-rol opcion-activa" id="opcion-estudiante" data-rol="estudiante">
            <div class="icono-rol">🎓</div>
            <div class="texto-rol">
              <p class="nombre-rol">Estudiante</p>
              <p class="descripcion-rol">Quiero encontrar un tutor</p>
            </div>
          </div>
          
          <div class="opcion-rol" id="opcion-tutor" data-rol="tutor">
            <div class="icono-rol">📚</div>
            <div class="texto-rol">
              <p class="nombre-rol">Tutor</p>
              <p class="descripcion-rol">Quiero dar clases</p>
            </div>
          </div>

        </div>
    
        <input type="hidden" id="rolSeleccionado" value="estudiante" />

        <!-- novalidate : manejo los errores con JS, no el navegador -->

        <form id="formulario-registro" novalidate>

          <div class="campo-formulario">
            <label for="nombre">Nombre completo</label>
            <input
              id="nombre"
              name="nombre"
              type="text"
              placeholder="Ej: Silvia Suarez"
            />
            <small id="nombre-error" class="error-text"></small>
          </div>

          <div class="campo-formulario">
            <label for="email">Correo electrónico</label>
            <input
              id="email"
              name="email"
              type="email"
              placeholder="tucorreo@ejemplo.com"
            />
            <small id="email-error" class="error-text"></small>
          </div>

        
          <div class="campo-formulario">
            <label for="password">Contraseña</label>
            <input
              id="password"
              name="password"
              type="password"
              placeholder="Mínimo 6 caracteres"
            />
            <small id="password-error" class="error-text"></small>
          </div>

    
          <div class="campo-formulario">
            <label for="confirmar-password">Confirmar contraseña</label>
            <input
              id="confirmar-password"
              name="confirmarPassword"
              type="password"
              placeholder="Repite tu contraseña"
            />
            <small id="confirmar-password-error" class="error-text"></small>
          </div>

          <p id="error-general" class="error-text"></p>

          <button type="submit" class="boton boton-morado boton-grande boton-ancho">
            Crear cuenta gratis
          </button>

        </form>
        <!-- Fin formulario -->

        <p class="texto-pie-formulario">
          ¿Ya tienes cuenta?
          <a href="login.html" class="link-formulario">Inicia sesión aquí</a>
        </p>

      </div>
    
    </div>

  </main>


  <!-- JavaScript -->

  <script>

    // ---- Selector de rol ----
    const opcionEstudiante = document.getElementById("opcion-estudiante");
    const opcionTutor      = document.getElementById("opcion-tutor");
    const campoRol         = document.getElementById("rolSeleccionado");


    opcionEstudiante.addEventListener("click", () => {
      opcionEstudiante.classList.add("opcion-activa");
      opcionTutor.classList.remove("opcion-activa");
      campoRol.value = "estudiante";
    });

    opcionTutor.addEventListener("click", () => {
      opcionTutor.classList.add("opcion-activa");
      opcionEstudiante.classList.remove("opcion-activa");
      campoRol.value = "tutor";
    });


    // ---- Formulario ----
    const form         = document.getElementById("formulario-registro");
    const errorGeneral = document.getElementById("error-general");

    form.addEventListener("submit", (event) => {
      // Evita que la página se recargue al enviar el formulario
      event.preventDefault();

      // Limpiamos los errores anteriores antes de validar de nuevo
      errorGeneral.textContent = "";
      document.querySelectorAll(".error-text").forEach(el => el.textContent = "");

      const nombre   = document.getElementById("nombre").value.trim();
      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const confirmar = document.getElementById("confirmar-password").value;
      const rol      = campoRol.value;
a
      let hayErrores = false;

      if (!nombre) {
        document.getElementById("nombre-error").textContent = "El nombre es obligatorio";
        hayErrores = true;
      }

      if (!email) {
        document.getElementById("email-error").textContent = "El correo es obligatorio";
        hayErrores = true;
      }

      if (password.length < 6) {
        document.getElementById("password-error").textContent = "La contraseña debe tener al menos 6 caracteres";
        hayErrores = true;
      }

      if (password !== confirmar) {
        document.getElementById("confirmar-password-error").textContent = "Las contraseñas no coinciden";
        hayErrores = true;
      }

      if (hayErrores) return;

      const resultado = register({ nombre, email, password, rol });

      if (!resultado.success) {
        errorGeneral.textContent = resultado.message;
        return;
      }

      // si todo sale bien, ejecutamos 

      if (rol === "estudiante") {
        window.location.href = "../pages/dashboard-estudiante.html";
      } else {
        window.location.href = "../pages/dashboard-tutor.html";
      }
    });
  </script>

</body>

</html>
